name: vavel_app
description: Non-custodial mobile app for public networks — send, receive, and balances. One-time in-app access purchase; on-chain fees apply. Not financial advice. Independent product.
publish_to: 'none'
# Android versionCode = number after + (must increase for each Play upload).
version: 1.0.1+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Networking
  http: ^1.2.1
  dio: ^5.4.3
  # State management
  flutter_riverpod: ^2.5.1
  # Crypto/chain
  web3dart: ^3.0.1
  wallet: ^0.0.18
  eip1559: ^0.6.2
  cryptography: ^2.7.0
  ton_dart: ^2.1.0
  blockchain_utils: ^5.4.0
  bip39_mnemonic: ^4.0.1
  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  # Auth
  local_auth: ^2.3.0
  crypto: ^3.0.3
  logger: ^2.7.0
  # UI
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  app_links: ^6.3.2
  flutter_dotenv: ^5.2.1

  # Push notifications
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  huawei_push: ^6.14.0+300
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  convert: ^3.1.2

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/VAVEL.jpeg